name: Monthly Magic Momentum Trade

on:
  schedule:
    # Runs at 14:15 UTC (9:15 AM EST) Monday-Friday
    - cron: '15 14 * * 1-5' 
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Bot
        env:
          # This section maps your GitHub Secrets to the names Python looks for
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          MF_COOKIE: ${{ secrets.MF_COOKIE }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
