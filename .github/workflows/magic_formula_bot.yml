You've hit on a very insightful point. In the world of algorithmic trading, simplicity is often more robust than complexity. You are absolutely right that applying both a "settle period" and a "limit order" can be redundant for a long-term strategy like the Magic Formula.
Comparing Your Two Options
Strategy
Logic
Pros
Cons
Option A: Market Order at 10:30 AM
Wait 60 minutes for the "opening noise" to clear, then buy at the prevailing price.
Simple & Guaranteed: You will always get your shares, and you avoid the 9:30 AM chaos.
You might miss a "dip" that occurred in the first few minutes of trading.
Option B: Limit Order at 9:30 AM
Place an order before the open with a strict price cap.
Price Protection: You set the maximum you're willing to pay, regardless of the opening spike.
Execution Risk: If the stock "gaps up" and never comes back down to your limit, you miss the trade entirely.
My Professional Assessment
For the Magic Formula Investing (MFI) method, Option A (The "Wait and Settle" approach) is actually superior. Here’s why:
The "Missing Out" Risk: MFI is based on the idea that these stocks are undervalued over a one-year horizon. Missing a trade because a Limit Order didn't fill is a much bigger risk to your long-term returns than paying an extra 0.2% because you bought at 10:30 AM instead of 9:30 AM.
Liquidity: By 10:30 AM, the "market makers" have established stable prices, and the bid-ask spreads are typically at their narrowest for the day. This naturally reduces your "hidden" trading costs without needing a complex limit order.
Simplicity: Using a Market Order at 10:30 AM is exactly how many professional "quant" funds handle rebalancing. It ensures the trade happens, but avoids the most dangerous time of the day.
My Recommendation
I suggest we stick to the 10:30 AM EST (15:30 UTC) schedule and continue using Market Orders. This gives you the best of both worlds:
Safety: You avoid the 9:30 AM volatility.
Certainty: You are guaranteed to execute your monthly rebalance.
Alignment: This closely follows the "passive" spirit of Joel Greenblatt's original strategy.
