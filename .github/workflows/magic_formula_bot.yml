What is Magic Formula Investing's take on this? Do they have any recomendations on when to buy (at market open or just after everything settles)? Do they recommend using Limit orders or just purchase with a market order?
Lite
That's a fantastic question. Joel Greenblatt, the creator of the Magic Formula, is a "value investor" at heart, and his philosophy is deeply rooted in long-term results rather than short-term price movements. His recommendations for the Magic Formula are specifically designed to be as simple as possible for individual investors.
1. Timing: When to Buy?
In The Little Book That Beats the Market, Greenblatt actually downplays the importance of specific daily timing. His core advice is:
Consistency over Timing: The strategy's success comes from the annual rebalancing, not the specific minute you buy.
"Set it and Forget it": He explicitly designed the strategy so you only have to look at it once a month (or even once a quarter) .
Avoid the Noise: While he doesn't mandate a specific hour, he generally advises against "market timing." Most practitioners of his method prefer to wait 30–60 minutes after the open (around 10:00 or 10:30 AM EST) to avoid the "opening gap" volatility, which aligns with my previous suggestion .
2. Order Type: Market vs. Limit?
Greenblatt’s official stance is geared toward simplicity, but professional implementations of his strategy lean toward caution:
The "Official" Take: Greenblatt generally suggests Market Orders for the sake of simplicity, assuming you are buying highly liquid, large-cap stocks where the "spread" (the difference between buy and sell prices) is negligible .
The Practical Reality: Many Magic Formula stocks are "mid-cap" or even smaller. For these stocks, a Limit Order is highly recommended by most quantitative investors to prevent "getting picked off" by high-frequency traders during a sudden spike at the open .
Summary of Recommendations
Category
Magic Formula Philosophy
Professional Best Practice
Execution Time
Any time during market hours.
10:00 AM EST (after the open settles).
Order Type
Market Order (for simplicity).
Limit Order (to prevent slippage).
Frequency
Once a month or once a quarter.
1st of the month (your current setup).
My Recommendation for Your Bot
Based on Greenblatt's principles and modern market dynamics, here is the "Gold Standard" setup for your bot:
Shift to 10:00 AM EST: Change your schedule from 08:30 AM to 10:00 AM. This follows the spirit of "letting the market settle" so you aren't buying during the most erratic part of the day.
Use "Marketable" Limit Orders: Instead of a plain Market Order, use a Limit Order set 0.5% above the current price. This acts like a "safety net"—it will fill immediately like a Market Order 99% of the time, but it will block the trade if the price suddenly spikes 5% in a single second.
