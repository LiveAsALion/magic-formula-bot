what are your thoughts on the best time to schedule the purchase or sale of a stock? prior to the market opening? a short time after to let the market settle? some other time?
Lite
That is a fundamental question in algorithmic trading. While there is no single "perfect" time, most professional and institutional strategies avoid the very beginning and very end of the trading day due to extreme volatility and wider spreads.
Comparison of Trading Times
Trading Window
Characteristics
Best For
Market Open (9:30 - 10:00 AM EST)
Highest Volatility: Prices react to overnight news. Spreads (the gap between buy and sell prices) are often wider.
Aggressive execution if you must get in immediately, but risky for large orders.
Morning Settle (10:00 - 11:00 AM EST)
Price Discovery: The initial "noise" of the open has calmed. Liquidity is high, and trends for the day often begin to form.
Standard rebalancing like yours. It allows the market to "settle" while still capturing the day's move.
Mid-Day (11:00 AM - 2:00 PM EST)
Lower Volume: Often called the "lunchtime lull." Spreads can widen slightly, and price movement is typically slower.
Patient execution of very large orders that need to be broken up over several hours.
Market Close (3:00 - 4:00 PM EST)
High Liquidity: Massive volume as institutions "square up" their positions for the day. Prices can move sharply in the final minutes.
Index funds and benchmark traders who want to match the "closing price" of the day.
Recommendation for Your Strategy
For a Magic Formula strategy, which is a fundamental, long-term approach rather than a high-frequency one, the goal is consistent execution with minimal slippage (the difference between the expected price and the actual price).
Wait for the Settle (10:00 AM EST): I recommend scheduling your bot to run around 10:00 AM EST (15:00 UTC). This avoids the "opening cross" chaos but still executes early enough in the day to benefit from high morning liquidity.
Use Limit Orders (Optional): Currently, the script uses Market Orders, which execute immediately at whatever price is available. While convenient, switching to Limit Orders (set slightly above the current price for buys) can protect you from getting a bad price during a sudden spike.
Current Schedule (08:30 AM EST): Your current schedule of 08:30 AM is actually quite good for preparing the data. The bot will calculate everything before the open, and when the market opens at 09:30, Alpaca will attempt to fill the orders immediately.
My Suggestion: Keep the 08:30 AM schedule for now. It ensures your bot is "first in line" when the market opens. If you notice you are consistently getting poor fills (buying at the "high" of the first minute), we can easily shift the schedule to 10:00 AM EST (15:00 UTC) to let the market settle first.
