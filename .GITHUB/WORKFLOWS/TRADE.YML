name: Monthly Magic Momentum Trade

on:
  schedule:
    # Runs at 9:30 AM EST (14:30 UTC) on the first Monday of every month
    - cron: '30 14 * * 1'
  workflow_dispatch: # Allows you to click the 'Run workflow' button manually

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install alpaca-py pandas requests

      - name: Execute Bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
