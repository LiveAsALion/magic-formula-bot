name: Monthly Magic Momentum Trade

on:
  schedule:
    # This runs at 14:30 UTC (9:30 AM EST) on the first Monday of every month
    - cron: '30 14 * * 1' 
  workflow_dispatch: # Allows you to run it manually via a button for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Trading Bot
        env:
          # Injects your secrets into the script environment
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python main.py
